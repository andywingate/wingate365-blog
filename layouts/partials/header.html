<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ "/" | relURL }}">
      <span class="brand-name">Wingate<span class="brand-365">365</span></span>
      {{- with .Site.Params.subtitle }}<span class="brand-tagline">{{ . }}</span>{{ end }}
    </a>
    <nav class="site-nav" aria-label="Primary">
      {{- range .Site.Menus.main }}
      <a href="{{ (or .PageRef .URL) | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a>
      {{- end }}
      {{ partial "search.html" . }}
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="theme-toggle-icon" aria-hidden="true"></span>
      </button>
    </nav>
  </div>
</header>
