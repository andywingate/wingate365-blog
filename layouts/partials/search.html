<div class="search">
  <svg class="search-icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
    <path fill="currentColor" d="M8.5 3a5.5 5.5 0 0 1 4.383 8.82l3.648 3.65a1 1 0 0 1-1.414 1.414l-3.649-3.648A5.5 5.5 0 1 1 8.5 3Zm0 2a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"/>
  </svg>
  <input
    type="search"
    id="search-input"
    class="search-input"
    placeholder="Search posts…"
    autocomplete="off"
    spellcheck="false"
    aria-label="Search posts"
    aria-expanded="false"
    aria-controls="search-results"
    data-index="{{ "index.json" | relURL }}">
  <div id="search-results" class="search-results" role="listbox" aria-label="Search results" hidden></div>
</div>
